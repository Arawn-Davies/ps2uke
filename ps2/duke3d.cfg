[Setup]
ConfigVersion = 0
ForceSetup = 0

[Screen Setup]
ScreenMode = 1
ScreenWidth = 320
ScreenHeight = 200
ScreenBPP = 8
ScreenSize = 4
Messages = 1
Detail = 1
ScreenGamma = 0

[Sound Setup]
FXDevice = 0
MusicDevice = 0
SoundToggle = 1
MusicToggle = 1
NumVoices = 8
NumChannels = 2
NumBits = 16
MixRate = 44100

[Misc]
Executions = 1
RunMode = 1
Crosshairs = 1

[Controls]
; DualShock via libpad (ps2_pad.c). Buttons/d-pad are injected as keys; the
; analog sticks feed jfbuild's joyaxis[] and are mapped here: left stick =
; strafe/move, right stick = turn/look. The digital sub-functions are set to
; None so a stick deflection doesn't *also* fire a key (gamefunc 0 = forward).
UseJoystick = 1
UseMouse = 0
JoystickAnalogAxes0 = analog_strafing
JoystickAnalogAxes1 = analog_moving
JoystickAnalogAxes2 = analog_turning
JoystickAnalogAxes3 = analog_lookingupanddown
JoystickDigitalAxes0_0 = None
JoystickDigitalAxes0_1 = None
JoystickDigitalAxes1_0 = None
JoystickDigitalAxes1_1 = None
JoystickDigitalAxes2_0 = None
JoystickDigitalAxes2_1 = None
JoystickDigitalAxes3_0 = None
JoystickDigitalAxes3_1 = None
